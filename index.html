<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FIFA World Cup 2026 Viewer</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}
header{
    text-align:center;
    padding:20px;
    background:#222;
}
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.card{
    background:#1e1e1e;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}
.btn{
    display:inline-block;
    padding:10px 15px;
    background:#0066ff;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>
<body>

<header>
<h1>FIFA World Cup 2026</h1>
<p>Match Schedule & Official Broadcasters</p>
</header>

<div class="container">

<div class="card">
<h2>Official Watch Options</h2>

<p>
<a class="btn" href="https://www.beinsports.com/en-mena/" target="_blank">
Watch via beIN Sports
</a>
</p>

<p>
<a class="btn" href="https://www.tod.tv/" target="_blank">
Watch via TOD
</a>
</p>

</div>

<div class="card">
<h2>Today's Matches</h2>
<div id="matches">
Match schedule will be updated here.
</div>
</div>

<div class="card">
<h2>Official FIFA Website</h2>
<p>
<a class="btn" href="https://www.fifa.com/" target="_blank">
Visit FIFA
</a>
</p>
</div>

</div>

</body>
</html>
