<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPTV Player with Search</title>

<style>
body{
    margin:0;
    font-family:Arial;
}

.container{
    display:flex;
    height:100vh;
}

.sidebar{
    width:320px;
    border-right:1px solid #ccc;
    display:flex;
    flex-direction:column;
}

#search{
    padding:12px;
    font-size:16px;
    border:none;
    border-bottom:1px solid #ccc;
}

#channels{
    flex:1;
    overflow-y:auto;
}

.channel{
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.channel:hover{
    background:#f0f0f0;
}

#player{
    flex:1;
    padding:10px;
}

video{
    width:100%;
    height:90vh;
    background:black;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>
<body>

<div class="container">

<div class="sidebar">

<input
type="text"
id="search"
placeholder="Search Channel...">

<div id="channels">
Loading channels...
</div>

</div>

<div id="player">
<video id="video" controls autoplay></video>
</div>

</div>

<script>

let allChannels=[];

fetch('https://iptv-org.github.io/iptv/index.m3u')
.then(response=>response.text())
.then(text=>{

let lines=text.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

let name=lines[i].split(',').pop().trim();
let url=lines[i+1];

allChannels.push({
name:name,
url:url
});

}

}

showChannels('');

});

function showChannels(searchText){

const channels=document.getElementById('channels');

channels.innerHTML='';

allChannels
.filter(ch =>
ch.name.toLowerCase().includes(searchText.toLowerCase())
)
.forEach(ch => {

let div=document.createElement('div');

div.className='channel';
div.innerText=ch.name;

div.onclick=function(){

const video=document.getElementById('video');

if(Hls.isSupported()){

var hls=new Hls();

hls.loadSource(ch.url);

hls.attachMedia(video);

}else{

video.src=ch.url;

}

};

channels.appendChild(div);

});

}

document.getElementById('search')
.addEventListener('keyup',function(){

showChannels(this.value);

});

</script>

</body>
</html>
