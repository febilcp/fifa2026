<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FIFA 2026 IPTV</title><style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

header{
    background:#008f3d;
    padding:15px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

.search-box{
    padding:10px;
    text-align:center;
}

#search{
    width:95%;
    max-width:600px;
    padding:12px;
    border:none;
    border-radius:5px;
    font-size:16px;
}

#count{
    text-align:center;
    color:yellow;
    padding:8px;
    font-weight:bold;
}

.buttons{
    text-align:center;
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    margin:3px;
    cursor:pointer;
    font-weight:bold;
}

.fifa{
    background:#00aa44;
    color:white;
}

.all{
    background:#444;
    color:white;
}

.container{
    display:flex;
    flex-wrap:wrap;
}

.channels{
    width:30%;
    min-width:280px;
    max-height:80vh;
    overflow-y:auto;
    background:#1a1a1a;
}

.channel{
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.channel:hover{
    background:#333;
}

.player{
    flex:1;
    padding:10px;
}

video{
    width:100%;
    height:75vh;
    background:black;
}

@media(max-width:768px){

.channels{
    width:100%;
    max-height:300px;
}

video{
    height:300px;
}

}
</style></head><body><header>⚽ FIFA 2026 IPTV</header><div class="search-box">
<input type="text" id="search" placeholder="Search Channel...">
</div><div id="count">Loading channels...</div><div class="buttons">
<button class="fifa" onclick="showFifa()">⚽ Sports / FIFA</button>
<button class="all" onclick="showAll()">📺 All Channels</button>
</div><div class="container"><div class="channels" id="channelList"></div><div class="player">
<video id="player" controls autoplay></video>
</div></div><script>

let channels=[];

async function loadM3U(){

try{

const response = await fetch(
"https://romaxa55.github.io/world_ip_tv/output/index.m3u"
);

const text = await response.text();

const lines = text.split("\n");

channels=[];

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

const name = lines[i].split(",").pop().trim();

const stream = lines[i+1] ? lines[i+1].trim() : "";

if(stream.startsWith("http")){

channels.push({
name:name,
url:stream,
fifa:/sport|sports|football|soccer|fifa|fox|bein|espn|uefa|sky/i.test(name)
});

}

}

}

document.getElementById("count").innerHTML =
"Total Channels : " + channels.length;

render(channels);

}catch(error){

document.getElementById("count").innerHTML =
"Failed to load playlist";

console.log(error);

}

}

function render(list){

const container =
document.getElementById("channelList");

container.innerHTML="";

list.forEach(ch=>{

let div=document.createElement("div");

div.className="channel";

div.innerHTML=ch.name;

div.onclick=function(){

const player =
document.getElementById("player");

player.src=ch.url;

player.play();

};

container.appendChild(div);

});

}

function showFifa(){

render(
channels.filter(
c=>c.fifa
)
);

}

function showAll(){

render(channels);

}

document.getElementById("search")
.addEventListener("keyup",function(){

let q=this.value.toLowerCase();

render(

channels.filter(

c=>c.name.toLowerCase().includes(q)

)

);

});

loadM3U();

</script></body>
</html>
