<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FIFA 2026 IPTV</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    background:#0a7a2f;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.search-box{
    padding:10px;
    text-align:center;
}

input{
    width:90%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:5px;
    font-size:16px;
}

.buttons{
    text-align:center;
    margin:10px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.fifa{
    background:#00aa44;
    color:white;
}

.all{
    background:#444;
    color:white;
}

.container{
    display:flex;
    flex-wrap:wrap;
}

.channels{
    width:30%;
    min-width:280px;
    max-height:80vh;
    overflow:auto;
    background:#1a1a1a;
}

.channel{
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.channel:hover{
    background:#333;
}

.player{
    flex:1;
    padding:10px;
}

video{
    width:100%;
    height:75vh;
    background:black;
}

.favorite{
    color:gold;
    float:right;
}

@media(max-width:768px){
    .channels{
        width:100%;
        max-height:300px;
    }

    video{
        height:300px;
    }
}
</style>
</head>

<body>

<header>⚽ FIFA 2026 IPTV</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search channel...">
</div>

<div class="buttons">
<button class="fifa" onclick="showFifa()">FIFA Channels</button>
<button class="all" onclick="showAll()">All Channels</button>
</div>

<div class="container">

<div class="channels" id="channelList"></div>

<div class="player">
<video id="player" controls autoplay></video>
</div>

</div>

<script>

const channels = [

{
name:"BBC Sport",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
fifa:true
},

{
name:"FOX Sports",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
fifa:true
},

{
name:"beIN Sports",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
fifa:true
},

{
name:"ITV Sport",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
fifa:true
},

{
name:"TSN",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
fifa:true
},

{
name:"General TV",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
fifa:false
}

];

let currentList = channels;

function render(list){

const container=document.getElementById("channelList");

container.innerHTML="";

list.forEach(ch=>{

let div=document.createElement("div");

div.className="channel";

div.innerHTML=
ch.name+
'<span class="favorite">★</span>';

div.onclick=()=>{
document.getElementById("player").src=ch.url;
};

container.appendChild(div);

});
}

function showFifa(){
render(channels.filter(x=>x.fifa));
}

function showAll(){
render(channels);
}

document.getElementById("search")
.addEventListener("keyup",function(){

let q=this.value.toLowerCase();

render(
channels.filter(
c=>c.name.toLowerCase().includes(q)
)
);

});

render(channels);

</script>

</body>
</html>
