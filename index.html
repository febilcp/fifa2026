<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My IPTV TV</title>

<link href="https://cdn.jsdelivr.net/npm/video.js/dist/video-js.css" rel="stylesheet">

<style>
body{
    font-family:Arial;
    margin:0;
}
.container{
    display:flex;
    height:100vh;
}
#channels{
    width:300px;
    overflow:auto;
    border-right:1px solid #ccc;
}
.channel{
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}
.channel:hover{
    background:#f0f0f0;
}
#player{
    flex:1;
    padding:10px;
}
video{
    width:100%;
    height:80vh;
}
</style>
</head>

<body>

<div class="container">

<div id="channels">
Loading channels...
</div>

<div id="player">
<video id="video" controls autoplay></video>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

fetch('https://iptv-org.github.io/iptv/index.m3u')
.then(r=>r.text())
.then(text=>{

let lines=text.split('\n');
let channels=document.getElementById('channels');

channels.innerHTML='';

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

let name=lines[i].split(',').pop();
let url=lines[i+1];

let div=document.createElement('div');
div.className='channel';
div.innerText=name;

div.onclick=function(){

const video=document.getElementById('video');

if(Hls.isSupported()){
const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}

};

channels.appendChild(div);
}

}

});

</script>

</body>
</html>
